<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Ounce</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">

<!--    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">-->
</head>
<body>

<div class="layout-container">
    <div class="image-section">
        <img src="/img/auth-bg.png" alt="신선한 식품" class="bg-image"/>
    </div>

    <div class="form-section">
        <div class="mobile-logo">
            <a href="/">Ounce<span>.</span></a>
        </div>

        <div class="auth-card">
            <div class="card-header">
                <h2>로그인</h2>
                <p>Ounce에 오신 것을 환영합니다</p>
            </div>

            <form id="loginForm" class="auth-form">

                <div class="input-group">
                    <label>이메일</label>
                    <input type="email" id="email" placeholder="이메일을 입력하세요" required />
                    <div id="emailError" class="error-text"></div>
                </div>

                <div class="input-group">
                    <label>비밀번호</label>
                    <input type="password" id="password" placeholder="비밀번호를 입력하세요" required />
                    <div id="passwordError" class="error-text"></div>
                </div>

                <button type="submit" class="btn-submit">로그인</button>
            </form>

            <div class="divider">
                <div class="line"></div>
                <span>또는</span>
                <div class="line"></div>
            </div>

            <div class="social-login">
                <button type="button" class="btn-social btn-google" onclick="location.href='/oauth2/authorization/google'">
                    <i class="ri-google-fill"></i> Google로 계속하기
                </button>
            </div>

            <div class="form-footer">
                <p>아직 계정이 없으신가요? <a href="/signup">회원가입</a></p>
            </div>
        </div>
    </div>
</div>

<script src="/js/login.js"></script>

</body>
</html>
