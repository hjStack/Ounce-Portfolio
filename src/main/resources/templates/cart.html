<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(title='장바구니 - Ounce')}"></head>
<body class="bg-[#fcfbf9]">

<div th:replace="~{fragments/navbar :: navbar}"></div>
<div th:replace="~{fragments/toast :: toast(${toastMessage}, ${toastType})}"></div>

<main class="pt-20 md:pt-24 min-h-screen pb-20">
    <!-- 장바구니가 비어있을 때 보여질 화면 -->
    <div id="empty-cart" class="hidden flex flex-col items-center justify-center px-4 py-32">
        <div class="text-center max-w-sm">
            <!-- 아이콘 -->
            <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
            </svg>
            <h1 class="text-xl font-bold text-gray-900 mb-2">
                장바구니가 비어 있어요
            </h1>
            <p class="text-sm text-gray-500 mb-6">
                텅 빈 장바구니, Ounce의 특별함으로 가득 채워볼까요?
            </p>
            <a href="/curation" class="inline-block px-6 py-2.5 bg-[#3b4055] text-white text-sm font-semibold rounded-md hover:bg-gray-800 transition-colors shadow-sm">
                큐레이션 둘러보기
            </a>
        </div>
    </div>

    <!-- 장바구니에 상품이 있을 때 보여질 화면 -->
    <div id="cart-content" class="hidden w-full px-4 md:px-8 lg:px-12 py-6 max-w-7xl mx-auto">
        <!-- Header -->
        <div class="mb-6">
            <h1 class="text-xl md:text-2xl font-bold text-gray-900">장바구니</h1>
            <p id="total-items-text" class="text-sm text-gray-500 mt-1">
                0개의 상품이 담겨 있어요
            </p>
        </div>

        <!-- Urgency banners (실시간 알림 배너들) -->
        <div class="flex flex-col gap-2 mb-6">
            <!-- Live viewers -->
            <div class="flex items-center gap-2 px-3 py-2 bg-[#d95d22]/10 border border-[#d95d22]/20 rounded-lg w-fit">
                <span class="relative flex h-2.5 w-2.5">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#d95d22] opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-[#d95d22]"></span>
                </span>
                <span class="text-xs font-medium text-[#d95d22]">
                    지금 <strong id="viewer-count" class="font-bold text-[#b84815]">42명</strong>이 장바구니를 확인하고 있어요
                </span>
            </div>

            <!-- Delivery deadline countdown -->
            <div id="countdown-banner" class="flex items-center gap-2 px-3 py-2 rounded-lg border bg-[#3b4055]/10 border-[#3b4055]/15 w-fit">
                <svg class="w-4 h-4 text-[#3b4055]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span id="countdown-text" class="text-xs font-medium text-[#3b4055]">
                    오늘 밤 12시까지 주문 시 <strong id="time-left" class="font-bold text-gray-900">00:00:00</strong> 남음 — 내일 아침 7시 전 도착
                </span>
            </div>

            <!-- Recent purchase ticker -->
            <div id="purchase-ticker" class="flex items-center gap-2 px-3 py-2 bg-[#3b4055]/10 border border-[#3b4055]/15 rounded-lg transition-all duration-300 w-fit">
                <svg class="w-4 h-4 text-[#3b4055]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                </svg>
                <span id="purchase-text" class="text-xs text-[#3b4055]">
                    <strong>서울</strong>에서 <strong>1분 전</strong> 결제 완료
                </span>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Left: Product list -->
            <div id="cart-items-container" class="flex-1 flex flex-col gap-4">
                <!-- JS를 통해 아이템들이 렌더링 됩니다 -->
            </div>

            <!-- Right: Order summary -->
            <div class="w-full lg:w-80 flex-shrink-0">
                <div class="sticky top-24 p-5 bg-white border border-gray-200 rounded-lg shadow-sm">
                    <h2 class="text-sm font-bold text-gray-900 mb-4">주문 요약</h2>

                    <div class="flex flex-col gap-2.5 mb-4">
                        <div class="flex items-center justify-between text-sm">
                            <span class="text-gray-500">상품 금액</span>
                            <span id="summary-total-price" class="text-gray-800 font-medium">0원</span>
                        </div>
                        <div class="flex items-center justify-between text-sm">
                            <span class="text-gray-500">배송비</span>
                            <span id="summary-shipping" class="text-[#3b4055] font-medium">무료</span>
                        </div>
                        <div id="free-shipping-msg" class="text-xs text-[#d95d22] hidden">
                            <span id="amount-needed">0</span>원 더 담으면 무료배송!
                        </div>
                    </div>

                    <div class="h-px bg-gray-200 mb-4"></div>

                    <div class="flex items-center justify-between mb-5">
                        <span class="text-sm font-bold text-gray-900">총 결제 금액</span>
                        <span id="summary-final-price" class="text-xl font-bold text-[#d95d22]">0원</span>
                    </div>

                    <button onclick="handleCheckout()" class="w-full h-12 flex items-center justify-center gap-2 bg-[#3b4055] text-white font-semibold rounded-md hover:bg-gray-800 transition-colors shadow-sm">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                        </svg>
                        <span id="checkout-btn-text">0원 결제하기</span>
                    </button>

                    <div class="mt-4 flex items-start gap-2 p-3 bg-gray-50 rounded-lg border border-gray-100">
                        <svg class="w-4 h-4 text-gray-500 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path>
                        </svg>
                        <div class="text-xs text-gray-600 leading-relaxed">
                            <strong class="text-gray-900">새벽배송</strong>
                            <br />
                            오늘 밤 12시까지 주문 → 내일 아침 7시 전 도착
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Checkout toast -->
    <div id="checkout-toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 px-6 py-3 bg-gray-900 text-white text-sm font-medium rounded-lg shadow-lg flex items-center gap-2 opacity-0 transition-opacity duration-300 pointer-events-none">
        <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
        주문이 완료되었습니다! 주문내역으로 이동합니다
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 💡 1. 가짜 로컬 스토리지를 폭파하고, 서버 데이터를 담을 전역 배열 선언
        let cart = [];

        const FREE_SHIPPING_THRESHOLD = 30000;
        const SHIPPING_FEE = 3000;

        const emptyCartEl = document.getElementById('empty-cart');
        const cartContentEl = document.getElementById('cart-content');
        const cartItemsContainer = document.getElementById('cart-items-container');

        // 💡 2. 네비게이션 바를 타고 오자마자 백엔드 API(/api/carts/me)를 찔러 데이터 가져오기
        async function fetchMyCart() {
            try {
                const response = await fetch('/api/carts/me', { credentials: 'include' });

                // 🚨 인증 유효성 체크: 만약 쿠키가 없거나 문지기(JwtFilter)한테 쫓겨나면 로그인으로 리다이렉트
                if (response.status === 401) {
                    alert('로그인이 필요한 서비스입니다.');
                    window.location.href = '/login';
                    return;
                }

                if (!response.ok) throw new Error('서버 데이터 로드 실패');

                // 백엔드 CartApiController가 보내준 List<CartItemDto>를 통째로 파싱
                cart = await response.json();
                renderCart(); // 받아온 생생한 DB 데이터로 화면 렌더링 시작!
            } catch (error) {
                console.error('장바구니 로딩 중 에러 발생:', error);
            }
        }

        // 💡 3. 장바구니 렌더링 함수 (서버 DTO 규격에 맞게 필드명 매핑)
        function renderCart() {
            if (cart.length === 0) {
                emptyCartEl.classList.remove('hidden');
                cartContentEl.classList.add('hidden');
                return;
            }

            emptyCartEl.classList.add('hidden');
            cartContentEl.classList.remove('hidden');

            let totalItems = 0;
            let totalPrice = 0;
            let cartHTML = '';

            cart.forEach(item => {
                totalItems += item.quantity;
                // 🚨 기존 item.price -> 백엔드 DTO 규격인 item.basePrice 로 변경!
                totalPrice += (item.basePrice * item.quantity);

                cartHTML += `
                <div class="flex gap-4 p-4 bg-white border border-gray-200 rounded-lg hover:border-gray-300 transition-colors shadow-sm">
                    <a href="/product/${item.productId}" class="flex-shrink-0 w-20 h-20 md:w-24 md:h-24 rounded-md overflow-hidden bg-gray-50 border border-gray-100">
                        <img src="${item.imageUrl}" alt="${item.name}" class="w-full h-full object-cover">
                    </a>
                    <div class="flex-1 flex flex-col justify-between min-w-0">
                        <div>
                            <a href="/product/${item.productId}" class="text-sm font-medium text-gray-900 hover:text-[#3b4055] transition-colors line-clamp-2">
                                ${item.name}
                            </a>
                        </div>
                        <div class="flex items-center justify-between mt-2">
                            <div class="flex items-center gap-2">
                                <button onclick="updateQuantity(${item.cartId}, -1)" ${item.quantity <= 1 ? 'disabled' : ''} class="w-7 h-7 flex items-center justify-center border border-gray-300 rounded text-gray-600 hover:bg-gray-50 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg>
                                </button>
                                <span class="text-sm font-medium text-gray-800 w-6 text-center">${item.quantity}</span>
                                <button onclick="updateQuantity(${item.cartId}, 1)" ${item.quantity >= 10 ? 'disabled' : ''} class="w-7 h-7 flex items-center justify-center border border-gray-300 rounded text-gray-600 hover:bg-gray-50 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                                </button>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="text-sm font-bold text-gray-900">${(item.basePrice * item.quantity).toLocaleString()}원</span>
                                <button onclick="removeItem(${item.cartId})" class="w-7 h-7 flex items-center justify-center text-gray-400 hover:text-red-500 transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            });

            cartItemsContainer.innerHTML = cartHTML;

            // 요약 영역 연산 로직 (동일)
            const shipping = totalPrice >= FREE_SHIPPING_THRESHOLD ? 0 : SHIPPING_FEE;
            const finalPrice = totalPrice + shipping;

            document.getElementById('total-items-text').textContent = `${totalItems}개의 상품이 담겨 있어요`;
            document.getElementById('summary-total-price').textContent = `${totalPrice.toLocaleString()}원`;
            document.getElementById('summary-shipping').textContent = shipping === 0 ? '무료' : `${shipping.toLocaleString()}원`;
            document.getElementById('summary-shipping').className = shipping === 0 ? 'text-[#3b4055] font-medium' : 'text-gray-800 font-medium';

            const freeShippingMsg = document.getElementById('free-shipping-msg');
            if (totalPrice < FREE_SHIPPING_THRESHOLD) {
                freeShippingMsg.classList.remove('hidden');
                document.getElementById('amount-needed').textContent = (FREE_SHIPPING_THRESHOLD - totalPrice).toLocaleString();
            } else {
                freeShippingMsg.classList.add('hidden');
            }

            document.getElementById('summary-final-price').textContent = `${finalPrice.toLocaleString()}원`;
            document.getElementById('checkout-btn-text').textContent = `${finalPrice.toLocaleString()}원 결제하기`;
        }

        // 💡 4. 수량 동적 변경 API 연동 (PATCH)
        window.updateQuantity = async function(cartId, delta) {
            const item = cart.find(i => i.cartId === cartId);
            if (!item) return;

            const targetQty = Math.max(1, Math.min(10, item.quantity + delta));
            if (item.quantity === targetQty) return;

            try {
                const response = await fetch(`/api/carts/${cartId}?quantity=${targetQty}`, {
                    method: 'PATCH',
                    credentials: 'include'
                });

                if (response.ok) {
                    item.quantity = targetQty;
                    renderCart();
                } else {
                    alert('수량 수정에 실패했습니다.');
                }
            } catch (err) {
                console.error('수량 업데이트 네트워크 오류:', err);
            }
        };

        // 💡 5. 장바구니 아이템 삭제 API 연동 (DELETE)
        window.removeItem = async function(cartId) {
            if (!confirm('선택하신 상품을 장바구니에서 완전히 뺄까요?')) return;

            try {
                const response = await fetch(`/api/carts/${cartId}`, {
                    method: 'DELETE',
                    credentials: 'include'
                });

                if (response.ok) {
                    cart = cart.filter(i => i.cartId !== cartId);
                    renderCart();
                } else {
                    alert('상품 제거에 실패했습니다.');
                }
            } catch (err) {
                console.error('삭제 처리 네트워크 오류:', err);
            }
        };

        window.handleCheckout = function() {
            window.location.href = '/orders';
        };

        // --- 실시간 알림 애니메이션 배너 로직 (대표님의 기존 코드 보존) ---
        const viewerCountEl = document.getElementById('viewer-count');
        let currentViewers = 42;
        setInterval(() => {
            const change = Math.floor(Math.random() * 9) - 4;
            currentViewers = Math.max(12, Math.min(180, currentViewers + change));
            if(viewerCountEl) viewerCountEl.textContent = `${currentViewers}명`;
        }, 3000 + Math.floor(Math.random() * 3000));

        const CITIES = ['서울', '부산', '대구', '인천', '광주', '대전', '울산', '수원', '성남', '고양', '용인', '청주', '전주', '창원', '김해'];
        const purchaseTicker = document.getElementById('purchase-ticker');
        const purchaseText = document.getElementById('purchase-text');

        setInterval(() => {
            const city = CITIES[Math.floor(Math.random() * CITIES.length)];
            const minutes = Math.floor(Math.random() * 5) + 1;
            if(purchaseTicker) purchaseTicker.classList.add('opacity-0');
            setTimeout(() => {
                if(purchaseText) purchaseText.innerHTML = `<strong>${city}</strong>에서 <strong>${minutes}분 전</strong> 결제 완료`;
                if(purchaseTicker) {
                    purchaseTicker.classList.remove('opacity-0');
                    purchaseTicker.classList.add('scale-[1.02]', 'bg-[#3b4055]/20');
                    setTimeout(() => {
                        purchaseTicker.classList.remove('scale-[1.02]', 'bg-[#3b4055]/20');
                    }, 800);
                }
            }, 300);
        }, 5000 + Math.floor(Math.random() * 5000));

        const countdownTextEl = document.getElementById('countdown-text');
        const countdownBanner = document.getElementById('countdown-banner');

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        setInterval(() => {
            const now = new Date();
            const midnight = new Date(now);
            midnight.setHours(24, 0, 0, 0);
            const timeLeft = midnight.getTime() - now.getTime();
            const isUrgent = timeLeft < 2 * 60 * 60 * 1000;
            const timeStr = formatTime(timeLeft);

            if (countdownTextEl && countdownBanner) {
                if (isUrgent) {
                    countdownBanner.className = 'flex items-center gap-2 px-3 py-2 rounded-lg border w-fit bg-[#d95d22]/10 border-[#d95d22]/20 text-[#d95d22]';
                    countdownBanner.querySelector('svg').classList.replace('text-[#3b4055]', 'text-[#d95d22]');
                    countdownTextEl.innerHTML = `오늘의 새벽배송 마감 임박! <strong class="font-bold text-[#b84815]">${timeStr}</strong> 후 마감`;
                } else {
                    countdownBanner.className = 'flex items-center gap-2 px-3 py-2 rounded-lg border w-fit bg-[#3b4055]/10 border-[#3b4055]/15';
                    countdownTextEl.innerHTML = `오늘 밤 12시까지 주문 시 <strong class="font-bold text-gray-900">${timeStr}</strong> 남음 — 내일 아침 7시 전 도착`;
                }
            }
        }, 1000);

        // 🚀 핵심 포인트: 장바구니 페이지 로드 즉시 비동기 함수 실행!
        fetchMyCart();
    });
</script>

</body>
</html>
