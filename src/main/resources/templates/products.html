<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(title='전체 상품 - Ounce')}"></head>
<body class="bg-white">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="pt-20 md:pt-24">
    <section class="w-full px-4 md:px-8 lg:px-12 py-10 max-w-7xl mx-auto">
        <h1 class="text-xl md:text-2xl font-bold font-heading text-foreground-950 mb-6">전체 상품</h1>

        <div th:if="${#lists.isEmpty(products)}" class="py-16 text-center text-foreground-500 text-sm">
            아직 등록된 상품이 없습니다.
        </div>

        <div th:unless="${#lists.isEmpty(products)}" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
            <th:block th:each="p : ${products}">
                <div th:replace="~{fragments/product-card :: productCard(${p}, '/products')}"></div>
            </th:block>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
