<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<footer th:fragment="footer" class="w-full bg-foreground-950">
    <!-- Upper Section -->
    <div class="w-full px-4 md:px-8 lg:px-12 py-16 md:py-20 max-w-7xl mx-auto">
        <div class="flex flex-col lg:flex-row lg:justify-between gap-12 lg:gap-16">
            <!-- Left: Brand + Newsletter -->
            <div class="lg:max-w-sm">
                <h3 class="text-white text-3xl md:text-4xl font-semibold font-heading mb-3 italic">Ounce</h3>
                <p class="text-white/50 text-sm leading-relaxed mb-8">
                    당신의 아침을 디자인합니다.<br/>
                    매일 새벽, 신선한 감각을 배송합니다.
                </p>

                <!-- Newsletter Form -->
                <form action="#" method="post" class="flex items-center gap-2 mb-2">
                    <input type="email" name="email" placeholder="Ounce Letter를 받아보세요" required
                           class="flex-1 bg-white/5 border border-white/15 rounded-md px-4 py-3 text-white text-sm placeholder-white/40 focus:outline-none focus:border-white/30"/>
                    <button type="submit"
                            class="px-4 py-3 bg-white/10 hover:bg-white/20 border border-white/15 rounded-md transition-colors text-white text-sm">
                        <i class="ri-mail-send-line"></i>
                    </button>
                </form>

                <div class="mt-8 flex items-center gap-3">
                    <span class="text-accent-500 text-xs">●</span>
                    <span class="text-white/40 text-xs">매일 밤 10시, 미드나이트 세일 오픈</span>
                </div>
            </div>

            <!-- Right: Navigation Grid -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-8">
                <div th:each="section : ${footerLinks}">
                    <h4 class="text-white/80 font-medium text-xs uppercase tracking-wider mb-4" th:text="${section.title}"></h4>
                    <ul class="flex flex-col gap-2">
                        <li th:each="link : ${section.links}">
                            <a href="#" class="text-white/40 hover:text-white/70 text-sm transition-colors" th:text="${link}"></a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Section -->
    <div class="border-t border-white/10">
        <div class="w-full px-4 md:px-8 lg:px-12 py-6 max-w-7xl mx-auto">
            <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                <p class="text-white/30 text-xs">&copy; 2026 Ounce. All rights reserved.</p>

                <!-- Social Icons -->
                <div class="flex items-center gap-3">
                    <a href="#" rel="nofollow" class="w-9 h-9 flex items-center justify-center rounded-md border border-white/10 text-white/40 hover:text-white/70 hover:border-white/25 transition-colors">
                        <i class="ri-instagram-line text-sm"></i>
                    </a>
                    <a href="#" rel="nofollow" class="w-9 h-9 flex items-center justify-center rounded-md border border-white/10 text-white/40 hover:text-white/70 hover:border-white/25 transition-colors">
                        <i class="ri-facebook-line text-sm"></i>
                    </a>
                    <a href="#" rel="nofollow" class="w-9 h-9 flex items-center justify-center rounded-md border border-white/10 text-white/40 hover:text-white/70 hover:border-white/25 transition-colors">
                        <i class="ri-youtube-line text-sm"></i>
                    </a>
                    <a href="#" rel="nofollow" class="w-9 h-9 flex items-center justify-center rounded-md border border-white/10 text-white/40 hover:text-white/70 hover:border-white/25 transition-colors">
                        <i class="ri-kakao-talk-line text-sm"></i>
                    </a>
                </div>

                <a href="#" class="text-white/30 hover:text-white/50 text-xs transition-colors">개인정보처리방침</a>
            </div>
        </div>
    </div>
</footer>

</body>
</html>
