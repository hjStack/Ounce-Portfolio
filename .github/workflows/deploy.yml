
name: 1인 가구를 위한 Ounce 배포

on:
  push:
    branches: [ "main", "dev", "feature/**" ]
  pull_request:
    branches: ["main"]

# 하나의 workflows는 1개 이상의 job으로 구성
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

 # steps : 특정 작업을 수행하는 가장 작은 단위
    steps:
      # 1. 깃허브 저장소에 있는 최신 코드를 로봇의 작업 공간으로 가져오기
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v3

      # 2. 자바 21 세팅 (로그에서 확인한 버전 반영!)
      - name: ☕ JDK 21 설치
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. application.yml 파일 생성 (보안 유지!)
      # DB 비밀번호 같은 민감한 정보는 깃허브에 올리면 안 되므로, GitHub Secrets에 숨겨두고 빌드할 때만 몰래 주입합니다.
      - name: 🛡️ application.yml 파일 만들기
        env:
          APP_YML: ${{ secrets.APPLICATION_YML }}
        run: |
          mkdir -p src/main/resources
          printf '%s' "$APP_YML" > src/main/resources/application.yml

#      - name: application-prod.yml 생성
#        run: |
#          echo "${{ secrets.APPLICATION_PROD_YML }}" > src/main/resources/application-prod.yml

      # 4. 메이븐(Maven)으로 프로젝트 빌드 (.jar 파일 생성)
      - name: 프로젝트 빌드 (Maven)
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      # 5. 도커 허브(Docker Hub) 로그인
      - name: 🐳 도커 허브 로그인

        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. 도커 이미지 빌드 및 도커 허브로 업로드(Push)
      - name: 🚀 도커 이미지 빌드 및 푸시

        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ounce-api:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/ounce-api:latest

      # 7. 실제 운영 서버(EC2 등)에 접속해서 배포 스크립트 실행
      - name: 🌐 운영 서버 접속 및 무중단 배포 실행
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 서버에 접속해서 최신 이미지를 다운받고 무중단 배포 스크립트(deploy.sh)를 실행합니다.
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/ounce-api:latest
            cd /home/${{ secrets.SERVER_USERNAME }}/ounce # 🔥 운영 서버의 Ounce 프로젝트 경로 (상황에 맞게 수정 필요)
            chmod +x ./deploy.sh
            ./deploy.sh
